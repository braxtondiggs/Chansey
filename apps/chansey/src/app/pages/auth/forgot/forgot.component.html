<app-auth-page-shell illustration="forgot">
  <h5 class="title-h5 text-center lg:text-left">Forgot Password</h5>
  <p class="body-small mt-4 text-center lg:text-left">Enter your email to reset your password.</p>
  <app-auth-messages [messages]="messages()" />
  <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" class="mt-8">
    <p-floatlabel variant="on" class="mt-4">
      <input
        id="email"
        type="email"
        formControlName="email"
        pInputText
        class="w-full"
        pSize="large"
        required
        autocomplete="email"
        [attr.aria-describedby]="formSubmitted() && forgotForm.get('email')?.invalid ? 'email-error' : null"
      />
      <label for="email">Email</label>
    </p-floatlabel>
    @if (formSubmitted() && forgotForm.get('email')?.invalid) {
      <small id="email-error" class="text-red-500" role="alert">
        {{ forgotForm.get('email')?.hasError('required') ? 'Email is required' : 'Please enter a valid email' }}
      </small>
    }
    <div class="my-8 flex items-center justify-between gap-4">
      <p-button routerLink="/login" [raised]="true" [style]="{ width: '100%' }" class="w-1/2" severity="secondary">
        <span>Cancel</span>
      </p-button>
      <p-button
        type="submit"
        [loading]="forgotMutation.isPending()"
        [raised]="true"
        [style]="{ width: '100%' }"
        class="w-1/2"
      >
        <span>Submit</span>
      </p-button>
    </div>
  </form>
  <div class="body-small mt-8 text-center lg:text-left">
    Not registered?
    <a routerLink="/register" class="text-primary-500 hover:underline">Create an Account</a>
  </div>
</app-auth-page-shell>
