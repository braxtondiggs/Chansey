<app-auth-page-shell illustration="forgot">
  <h5 class="title-h5 text-center lg:text-left">Verification</h5>
  <p class="body-small mt-4 text-center lg:text-left">
    We have sent a code to your email: <span class="text-primary">{{ emailCensored }}</span>
  </p>
  <app-auth-messages [messages]="messages()" />
  <form [formGroup]="otpForm" (ngSubmit)="onSubmit()" class="mt-8">
    <p-inputotp formControlName="code" [length]="6" autoFocus size="large" />

    @if (formSubmitted() && otpForm.get('code')?.invalid) {
      <small id="otp-error" class="text-red-500" role="alert"> Please enter the 6-digit verification code </small>
    }
    <div class="my-8 flex items-center justify-between gap-4">
      <p-button routerLink="/login" [raised]="true" [style]="{ width: '100%' }" class="w-1/2" severity="secondary">
        <span>Cancel</span>
      </p-button>
      <p-button
        type="submit"
        [loading]="verifyOtpMutation.isPending()"
        [raised]="true"
        [style]="{ width: '100%' }"
        class="w-1/2"
      >
        <span>Verify</span>
      </p-button>
    </div>
  </form>
  <div class="body-small mt-4 text-center">
    Didn't receive the code?
    <button
      type="button"
      class="text-primary-500 hover:underline"
      [disabled]="resendOtpMutation.isPending()"
      (click)="resendOtp()"
    >
      {{ resendOtpMutation.isPending() ? 'Sending...' : 'Resend Code' }}
    </button>
  </div>
</app-auth-page-shell>
